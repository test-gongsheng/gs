<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票投资组合监控 - 专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
        .header h1 { font-size: 24px; }
        .header-stats { display: flex; gap: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
        .positive { color: #00d4aa; } .negative { color: #ff6b6b; }
        .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 1200px) { .grid-container { grid-template-columns: 1fr; } }
        .card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .stock-table th { text-align: left; padding: 12px 8px; color: #888; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stock-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .axis-price { background: rgba(155,89,182,0.15); padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #bb8fce; }
        .tag-buy { background: rgba(0,212,170,0.2); color: #00d4aa; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .tag-sell { background: rgba(255,107,107,0.2); color: #ff6b6b; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .tag-hold { background: rgba(255,255,255,0.1); color: #888; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .sentiment-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 10px; }
        .score-bullish { background: rgba(0,212,170,0.2); color: #00d4aa; padding: 6px 12px; border-radius: 6px; font-size: 12px; }
        .score-bearish { background: rgba(255,107,107,0.2); color: #ff6b6b; padding: 6px 12px; border-radius: 6px; font-size: 12px; }
        .sector-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sector-item { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; border-left: 3px solid #4a90d9; }
        .alert-box { background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,212,170,0.05)); border: 1px solid rgba(0,212,170,0.3); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .alert-box.sell { background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,107,107,0.05)); border-color: rgba(255,107,107,0.3); }
        .update-time { text-align: center; color: #666; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div><h1>📊 投资组合监控</h1><div style="color:#888;font-size:12px;margin-top:5px;">数据每30秒自动刷新 | 财联社数据源</div></div>
        <div class="header-stats">
            <div class="stat-item"><div class="stat-value">600万</div><div class="stat-label">总投资</div></div>
            <div class="stat-item"><div class="stat-value positive">约580万</div><div class="stat-label">当前市值</div></div>
            <div class="stat-item"><div class="stat-value positive">约+85万</div><div class="stat-label">浮动盈亏</div></div>
        </div>
    </div>

    <div class="grid-container">
        <div>
            <div class="card">
                <div class="card-title">📈 自选股持仓 (实时价格 2026-03-02 16:14)</div>
                <table class="stock-table">
                    <tr><th>股票</th><th>现价</th><th>涨跌</th><th>中轴价</th><th>策略</th></tr>
                    <tr><td>万向钱潮(000559)</td><td>18.68</td><td class="negative">-6.93%</td><td><span class="axis-price">17.50</span></td><td><span class="tag-hold">持有</span></td></tr>
                    <tr><td>三花智控(002050)</td><td>49.40</td><td class="negative">-3.53%</td>
